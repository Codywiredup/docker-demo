apiVersion: apps/v1
kind: Deployment
metadata:
  name: dem-dev

spec:
  replicas: 1

  selector:
    matchLabels:
      app: dem-dev

  template:
    metadata:
      labels:
        app: dem-dev

    spec:
      containers:
      - name: dem-dev
        image: 184933499296.dkr.ecr.ap-northeast-1.amazonaws.com/dem-dev:latest
        ports:
        - containerPort: 80